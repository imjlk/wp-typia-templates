name: Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-release-pr:
    name: Update release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate pending changesets
        run: bun run changesets:validate

      - name: Validate publish package coverage
        run: bun run publish:validate

      - name: Validate runtime package coupling
        run: bun run runtime-coupling:validate

      - name: Install Sampo
        run: cargo install sampo --locked --version 0.17.0

      - name: Prepare release changes
        shell: bash
        run: |
          set +e
          bun run release
          status=$?
          set -e

          if [ "$status" -eq 2 ]; then
            echo "No release changes to prepare."
            exit 0
          fi

          exit "$status"

      - name: Create or update release PR
        id: release_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/sampo
          base: main
          title: "release: version packages"
          commit-message: "release: version packages"
          body: |
            Automated release PR generated from the latest `main` changes.

            - updates package versions
            - updates package changelogs
            - consumes pending `.sampo/changesets/*`

            Merge this PR with **Squash and merge** to automatically create a GitHub Release and trigger npm OIDC publish from `main`.
          add-paths: |
            .sampo/**
            packages/**/package.json
            packages/**/CHANGELOG.md

      - name: Add release label
        if: steps.release_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.release_pr.outputs.pull-request-number }}
        shell: bash
        run: |
          set +e

          for attempt in 1 2 3; do
            if gh pr edit "$PR_NUMBER" --add-label release; then
              exit 0
            fi

            echo "Attempt ${attempt} to add the release label failed; retrying..."
            sleep $((attempt * 5))
          done

          echo "::warning::Failed to add the release label to PR #${PR_NUMBER}; continuing."
