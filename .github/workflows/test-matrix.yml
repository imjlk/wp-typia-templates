name: Test Matrix

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      node_version:
        description: "Node.js version"
        required: false
        default: "24"
        type: choice
        options:
          - "24"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-matrix:
    name: Bun / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.node_version) || '["24"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-1.3.10-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-1.3.10-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache wp-env home
        uses: actions/cache@v5
        with:
          path: |
            ~/.wp-env
            ~/wp-env
          key: wp-env-${{ runner.os }}-${{ matrix.node }}-${{ hashFiles('.wp-env.json', '.wp-env.test.json', 'examples/my-typia-block/package.json', 'examples/persistence-examples/package.json', 'examples/compound-patterns/package.json', 'bun.lock') }}
          restore-keys: |
            wp-env-${{ runner.os }}-${{ matrix.node }}-
            wp-env-${{ runner.os }}-

      - name: Run unit tests
        run: bun run test

      - name: Build packages and example
        run: |
          bun run packages:build
          bun run examples:build

      - name: Setup example WordPress environment
        run: |
          bun run examples:wp-env:stop:test || true
          bun run examples:wp-env:start:test

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Run example E2E tests
        run: bun run examples:test:e2e:ci

      - name: Stop WordPress
        if: always()
        continue-on-error: true
        run: bun run examples:wp-env:stop:test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-1.3.10-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-1.3.10-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun audit
        run: bun audit --audit-level high

      - name: Run CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
