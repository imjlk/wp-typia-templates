name: CI/CD Pipeline

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  BUN_VERSION: '1.3.11'
  PHP_VERSION: '8.1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          tools: composer:v2

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate pending changesets
        run: bun run changesets:validate

      - name: Validate maintenance automation policy
        run: bun run maintenance-automation:validate

      - name: Validate formatting toolchain policy
        run: bun run formatting-policy:validate

      - name: Run formatting check
        run: bun run format:check

      - name: Validate publish package coverage
        run: bun run publish:validate

      - name: Validate runtime package coupling
        run: bun run runtime-coupling:validate

      - name: Validate package manifest policy
        run: bun run manifest-policy:validate

      - name: Validate TypeScript strictness policy
        run: bun run typescript-strictness:validate

      - name: Validate TypeScript runtime dependency placement
        run: bun run typescript-runtime:validate

      - name: Run example linting
        run: bun run examples:lint

      - name: Run PHP checks
        run: bun run lint:php

      - name: Run type check
        run: bun run typecheck

  node-20-baseline:
    name: Node 20 Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          node-version: '20'

      - name: Validate package manifest policy
        run: bun run manifest-policy:validate

      - name: Run type check
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test:unit

  test-core:
    name: Unit Tests (Core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Run tests
        run: bun run test:coverage:packages

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          files: ./coverage/unit/lcov.info,./packages/wp-typia-api-client/coverage/lcov.info,./packages/wp-typia-block-runtime/coverage/lcov.info,./packages/wp-typia-block-types/coverage/lcov.info,./packages/wp-typia-rest/coverage/lcov.info,./packages/wp-typia/coverage/lcov.info
          flags: unit-core
          name: codecov-unit-core

  test-project-tools:
    name: 'Project Tools: ${{ matrix.label }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Scaffold Core
            command: bun run test:project-tools:scaffold-core
          - label: Workspace
            command: bun run test:project-tools:workspace
          - label: Compound
            command: bun run test:project-tools:compound
          - label: Migration Planning
            command: bun run test:project-tools:migration-planning
          - label: Migration Execution
            command: bun run test:project-tools:migration-execution
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Run ${{ matrix.label }} regression tests
        run: ${{ matrix.command }}

  test-project-tools-coverage:
    name: Project Tools Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Run coverage tests
        run: bun run test:coverage:project-tools

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          files: ./packages/wp-typia-project-tools/coverage/lcov.info
          flags: project-tools
          name: codecov-project-tools

  docs-build-check:
    name: Docs Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Build documentation site
        run: bun run docs:build:site

  build:
    name: Build CLI and Example
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-core
      - test-project-tools
      - test-project-tools-coverage
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.test-core.result == 'success' &&
      needs.test-project-tools.result == 'success' &&
      (needs.test-project-tools-coverage.result == 'success' || needs.test-project-tools-coverage.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Build packages and example
        run: |
          bun run packages:build
          bun run examples:build

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: wp-typia-project-tools-dist
          path: packages/wp-typia-project-tools/dist/
          retention-days: 7

      - name: Upload reference app build artifact
        uses: actions/upload-artifact@v7
        with:
          name: my-typia-block-build
          path: examples/my-typia-block/build/
          retention-days: 7

      - name: Upload persistence examples build artifact
        uses: actions/upload-artifact@v7
        with:
          name: persistence-examples-build
          path: examples/persistence-examples/build/
          retention-days: 7

      - name: Upload compound patterns build artifact
        uses: actions/upload-artifact@v7
        with:
          name: compound-patterns-build
          path: examples/compound-patterns/build/
          retention-days: 7

  publish-install-smoke:
    name: Published Install Smoke
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-core
      - test-project-tools
      - test-project-tools-coverage
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.test-core.result == 'success' &&
      needs.test-project-tools.result == 'success' &&
      (needs.test-project-tools-coverage.result == 'success' || needs.test-project-tools-coverage.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Run published install smoke
        run: bun run test:publish-install-smoke

  generated-smoke:
    name: Generated Project Smoke (${{ matrix.package_manager }})
    runs-on: ubuntu-latest
    needs: [build, publish-install-smoke]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: bun
            template: basic
            package_manager: bun
            project_name: smoke-basic-bun
          - runtime: node
            template: interactivity
            package_manager: pnpm
            project_name: smoke-interactivity-pnpm
          - runtime: bun
            template: persistence
            data_storage: custom-table
            persistence_policy: authenticated
            package_manager: bun
            project_name: smoke-persistence-authenticated-custom-table-bun
          - runtime: node
            template: persistence
            data_storage: custom-table
            persistence_policy: public
            package_manager: npm
            project_name: smoke-persistence-public-custom-table-npm
          - runtime: bun
            template: compound
            package_manager: bun
            project_name: smoke-compound-bun
          - runtime: bun
            template: compound
            persistence_policy: authenticated
            package_manager: bun
            project_name: smoke-compound-authenticated-bun
          - runtime: node
            template: compound
            data_storage: post-meta
            persistence_policy: public
            package_manager: npm
            project_name: smoke-compound-public-post-meta-npm
          - runtime: node
            template: ./packages/wp-typia-project-tools/tests/fixtures/create-block-external
            variant: hero
            package_manager: npm
            project_name: smoke-remote-create-block-external
          - runtime: node
            template: '@wp-typia/create-workspace-template'
            package_manager: npm
            project_name: smoke-workspace-add-variation-npm
            with_migration_ui: true
            add_block_name: counter-card
            add_template: basic
            add_variation_name: hero-card
            add_variation_block: counter-card
          - runtime: node
            template: 'workspace'
            package_manager: npm
            project_name: smoke-workspace-add-pattern-npm
            add_pattern_name: hero-layout
          - runtime: node
            template: '@wp-typia/create-workspace-template'
            package_manager: npm
            project_name: smoke-workspace-add-binding-source-npm
            add_binding_source_name: hero-data
          - runtime: node
            template: '@wp-typia/create-workspace-template'
            package_manager: npm
            project_name: smoke-workspace-add-hooked-block-npm
            add_block_name: counter-card
            add_template: basic
            add_hooked_block_slug: counter-card
            add_hooked_block_anchor: core/post-content
            add_hooked_block_position: after
          - runtime: bun
            example_project: my-typia-block
            package_manager: bun
            project_name: smoke-reference-my-typia-block-bun
          - runtime: bun
            example_project: compound-patterns
            package_manager: bun
            project_name: smoke-example-compound-patterns-bun
          - runtime: bun
            example_project: persistence-examples
            package_manager: bun
            project_name: smoke-example-persistence-examples-bun
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Download CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: wp-typia-project-tools-dist
          path: packages/wp-typia-project-tools/dist

      - name: Enable Corepack
        run: corepack enable

      - name: Run generated project smoke
        run: |
          args=(
            --runtime "${{ matrix.runtime }}"
            --package-manager "${{ matrix.package_manager }}"
            --project-name "${{ matrix.project_name }}"
          )
          if [ -n "${{ matrix.template || '' }}" ]; then
            args+=(--template "${{ matrix.template }}")
          fi
          if [ -n "${{ matrix.variant || '' }}" ]; then
            args+=(--variant "${{ matrix.variant }}")
          fi
          if [ -n "${{ matrix.example_project || '' }}" ]; then
            args+=(--example-project "${{ matrix.example_project }}")
          fi
          if [ -n "${{ matrix.data_storage || '' }}" ]; then
            args+=(--data-storage "${{ matrix.data_storage }}")
          fi
          if [ -n "${{ matrix.persistence_policy || '' }}" ]; then
            args+=(--persistence-policy "${{ matrix.persistence_policy }}")
          fi
          if [ "${{ matrix.with_migration_ui || false }}" = "true" ]; then
            args+=(--with-migration-ui)
          fi
          if [ -n "${{ matrix.add_block_name || '' }}" ]; then
            args+=(--add-block-name "${{ matrix.add_block_name }}")
          fi
          if [ -n "${{ matrix.add_template || '' }}" ]; then
            args+=(--add-template "${{ matrix.add_template }}")
          fi
          if [ -n "${{ matrix.add_data_storage || '' }}" ]; then
            args+=(--add-data-storage "${{ matrix.add_data_storage }}")
          fi
          if [ -n "${{ matrix.add_persistence_policy || '' }}" ]; then
            args+=(--add-persistence-policy "${{ matrix.add_persistence_policy }}")
          fi
          if [ -n "${{ matrix.add_variation_name || '' }}" ]; then
            args+=(--add-variation-name "${{ matrix.add_variation_name }}")
          fi
          if [ -n "${{ matrix.add_variation_block || '' }}" ]; then
            args+=(--add-variation-block "${{ matrix.add_variation_block }}")
          fi
          if [ -n "${{ matrix.add_pattern_name || '' }}" ]; then
            args+=(--add-pattern-name "${{ matrix.add_pattern_name }}")
          fi
          if [ -n "${{ matrix.add_binding_source_name || '' }}" ]; then
            args+=(--add-binding-source-name "${{ matrix.add_binding_source_name }}")
          fi
          if [ -n "${{ matrix.add_hooked_block_slug || '' }}" ]; then
            args+=(--add-hooked-block-slug "${{ matrix.add_hooked_block_slug }}")
          fi
          if [ -n "${{ matrix.add_hooked_block_anchor || '' }}" ]; then
            args+=(--add-hooked-block-anchor "${{ matrix.add_hooked_block_anchor }}")
          fi
          if [ -n "${{ matrix.add_hooked_block_position || '' }}" ]; then
            args+=(--add-hooked-block-position "${{ matrix.add_hooked_block_position }}")
          fi
          node scripts/run-generated-project-smoke.mjs "${args[@]}"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download example build artifact
        uses: actions/download-artifact@v8
        with:
          name: my-typia-block-build
          path: examples/my-typia-block/build

      - name: Download persistence examples build artifact
        uses: actions/download-artifact@v8
        with:
          name: persistence-examples-build
          path: examples/persistence-examples/build

      - name: Download compound patterns build artifact
        uses: actions/download-artifact@v8
        with:
          name: compound-patterns-build
          path: examples/compound-patterns/build

      # Restored wp-env homes can keep a stale plugin activation state across runs.
      - name: Cache wp-env home
        uses: actions/cache@v5
        with:
          path: |
            ~/.wp-env
            ~/wp-env
          key: wp-env-${{ runner.os }}-${{ hashFiles('.wp-env.json', '.wp-env.test.json', 'examples/my-typia-block/package.json', 'examples/persistence-examples/package.json', 'examples/compound-patterns/package.json', 'bun.lock') }}
          restore-keys: |
            wp-env-${{ runner.os }}-

      - name: Setup example WordPress environment
        run: |
          bun run examples:wp-env:start:test

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Run example E2E tests
        run: bun run examples:test:e2e:ci

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop WordPress
        if: always()
        continue-on-error: true
        run: bun run examples:wp-env:stop:test

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-core
      - test-project-tools
      - test-project-tools-coverage
      - build
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success' &&
      needs.test-project-tools.result == 'success' &&
      (needs.test-project-tools-coverage.result == 'success' || needs.test-project-tools-coverage.result == 'skipped')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace toolchain
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Build documentation site
        run: bun run docs:build:site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ./apps/docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
