name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  BUN_VERSION: "1.3.10"
  NPM_REGISTRY: "https://registry.npmjs.org"

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint

      - name: Run type check
        run: bun run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage/unit/lcov.info,./packages/create/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build CLI and Example
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace targets
        run: bun run build

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-typia-create-dist
          path: packages/create/dist/
          retention-days: 7

      - name: Upload example build artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-typia-block-build
          path: test-template/my-typia-block/build/
          retention-days: 7

  generated-smoke:
    name: Generated Project Smoke (${{ matrix.package_manager }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: bun
            template: basic
            package_manager: bun
            project_name: smoke-basic-bun
          - runtime: node
            template: full
            package_manager: npm
            project_name: smoke-full-npm
          - runtime: node
            template: interactivity
            package_manager: pnpm
            project_name: smoke-interactivity-pnpm
          - runtime: node
            template: advanced
            package_manager: yarn
            project_name: smoke-advanced-yarn
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: wp-typia-create-dist
          path: packages/create/dist

      - name: Enable Corepack
        run: corepack enable

      - name: Run generated project smoke
        run: |
          node scripts/run-generated-project-smoke.mjs \
            --runtime "${{ matrix.runtime }}" \
            --template "${{ matrix.template }}" \
            --package-manager "${{ matrix.package_manager }}" \
            --project-name "${{ matrix.project_name }}"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup WordPress
        run: |
          bun run wp-env:start
          sleep 30

      - name: Install Playwright
        run: bunx playwright install --with-deps

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop WordPress
        if: always()
        run: bun run wp-env:stop

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build documentation
        run: bun run docs:build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
