name: Publish standalone wp-typia binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to upload standalone assets to
        required: true
        type: string

permissions:
  contents: write

env:
  BUN_VERSION: '1.3.11'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: standalone-assets-${{ github.event.release.tag_name || inputs.release_tag || github.run_id }}
  cancel-in-progress: false

jobs:
  upload-standalone-assets:
    name: Build and upload standalone assets
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build publishable packages
        run: bun run packages:build

      - name: Build standalone binaries
        run: bun run --filter wp-typia build:standalone:release

      - name: Stage standalone release assets
        run: >
          bun --cwd packages/wp-typia scripts/prepare-standalone-release-assets.ts
          --input-dir ./.cache/standalone/raw
          --outdir ./.cache/standalone/release-assets
          --release-tag "${{ steps.release.outputs.tag }}"

      - name: Upload standalone release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "$RELEASE_TAG" packages/wp-typia/.cache/standalone/release-assets/* --clobber
