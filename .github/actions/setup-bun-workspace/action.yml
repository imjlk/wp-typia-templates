name: Setup Bun Workspace
description: Setup Bun (and optional Node), warm the Bun install cache, and install root workspace dependencies.

inputs:
  bun-version:
    description: Bun version to install.
    required: true
  node-version:
    description: Optional Node.js version to install before Bun.
    required: false
    default: ''
  install-command:
    description: Command used to install workspace dependencies.
    required: false
    default: bun install --frozen-lockfile
  working-directory:
    description: Working directory for the install command.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Setup Node.js
      if: ${{ inputs.node-version != '' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Bun install cache
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: bun-install-${{ runner.os }}-${{ inputs.bun-version }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-install-${{ runner.os }}-${{ inputs.bun-version }}-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.install-command }}
