version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci(deps)'
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: 'composer'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:15'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'build(deps)'
    groups:
      php-tooling:
        patterns:
          - '*'
